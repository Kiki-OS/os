# Kiki OS Lite — agentd configuration (ARM/edge)
# Generated at image build time. Do not edit directly.

[inference]
default_model    = "@@DEFAULT_MODEL@@"
llama_server_bin = "/usr/bin/llama-server"
local_model_dir  = "/var/lib/kiki/models"
# Sensor-class device: keep one model warm, short TTL, smaller context.
idle_ttl_secs    = 120
max_slots        = 1
context_size     = 2048

[router_policy]
# Conservative defaults for edge devices — stay local unless explicitly allowed
allow_remote                    = false
allow_third_party_remote        = false
default_privacy_level           = "standard"
preferred_model                 = "auto"
disable_remote_below_battery_pct = 20
disable_third_party_for_voice   = true
trace_decisions                 = false

[control_mode]
default              = "agent_mode"
allow_remote_bypass  = false
bypass_checkpoint_interval_secs = 30

[sockets]
mcp     = "/run/kiki/mcp.sock"
a11y    = "/run/kiki/a11y.sock"
memory  = "/run/kiki/memory.sock"
control = "/run/kiki/agentd-control.sock"

[fleet]
enabled            = true
cloud_url          = ""
heartbeat_interval = 60
